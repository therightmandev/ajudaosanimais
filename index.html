<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

	<meta name="viewport" content="width=device-width, initial-scale=1">

</head>


<body style="background: var(--secondary-color)">
	<style>
		:root {
			--primary-color: #053685;
			--secondary-color: #eef2f7;
		}

		* {
			color: var(--primary-color);
			margin: 0;
			padding: 0;
			font-family: "Red Hat Text", sans-serif;
		}

		html {
			font-size: 16px;
		}

		.org-title {
			font-size: 2.9rem;
		}

		body {
			font-size: 1.5rem;
		}

		a {
			color: #4764ba;
			text-decoration: none;
		}

		a:before {
			content: "🔗 ";
		}
	</style>

	<div style="padding: 0 20px; background: var(--primary-color)">
		<h1 style="font-size: 2rem; color: var(--secondary-color);">Ajuda os Animais</h1>
	</div>

	<div style="margin: 40px 20px; max-width: 500px; margin-left: auto; margin-right: auto">
		<p style="margin: 40px 0 0; font-size: 1rem;">Apoia estas organiza&ccedil;&otilde;es através de doa&ccedil;&otilde;es, voluntariado e partilhas nas redes sociais :)</p>

		
		<div id="list-of-programatic-organizations"><!-- This will be filled with the orgs --></div>

		<script>
			const programaticOrganizations = [
				{
					name: "Frente Animal",
					website: "https://www.frenteanimal.com",
					instagram: "https://www.instagram.com/frenteanimalorg/"
				},
				{
					name: "Desafio Vegetariano",
					website: "https://desafiovegetariano.com",
					instagram: "https://www.instagram.com/desafiovegetarianopt/"
				},
				{
					name: "ProVeg",
					website: "https://proveg.org/pt/",
					instagram: "https://www.instagram.com/provegpt/"
				},
				{
					name: "Animal Save & Care",
					website: "https://www.saveandcare.org",
					instagram: "https://www.instagram.com/saveandcare.libertacaoanimal"
				},
				{
					name: "SOS Animal",
					website: "https://www.sosanimal.com",
					instagram: "https://www.instagram.com/sosanimalportugal"
				},
				{
					name: "Associação Amigos Picudos",
					website: "https://amigospicudos.webnode.pt",
					instagram: "https://www.instagram.com/assoc.amigos.picudos/"
				},
				{
					name: "Associação Bichos Exóticos",
					instagram: "https://www.instagram.com/bichos__exoticos/"
				},
				{
					name: "Centro de Estudos e Recuperação de Animais Selvagens",
					website: "https://quercus.pt/centros-recuperacao-animais-selvagens/",
					instagram: "https://www.instagram.com/cerascb/"
				},
			];

			const listContainer = document.getElementById("list-of-programatic-organizations");

			programaticOrganizations.forEach(org => {
				const orgDiv = document.createElement("div");
				orgDiv.style.padding = "10px";
				orgDiv.style.marginTop = "30px";
				orgDiv.style.marginBottom = "30px";

				const orgTitle = document.createElement("h2");
				orgTitle.className = "org-title";
				orgTitle.textContent = org.name;
				orgDiv.appendChild(orgTitle);

				const orgLinks = document.createElement("ul");
				orgLinks.style.listStyle = "none";
				orgLinks.style.fontSize = "1.2rem";

				["instagram", "website"].forEach(key => {
					if (org[key]) {
						const linkItem = document.createElement("li");
						const anchor = document.createElement("a");
						anchor.href = org[key];
						anchor.textContent = key.charAt(0).toUpperCase() + key.slice(1);
						linkItem.appendChild(anchor);
						orgLinks.appendChild(linkItem);
					}
				});

				hr = document.createElement("hr");
				hr.style = "border-width: 0; height:3px; background: #c5d5ea";

				orgDiv.appendChild(orgLinks);
				listContainer.appendChild(orgDiv);
				listContainer.appendChild(hr);
			});
		</script>

		<p style="margin: 40px 0 40px; font-size: 1rem; color: var(--primary-color);">Atualizado a 22 de Março de 2026</p>
	</div>
</body>
